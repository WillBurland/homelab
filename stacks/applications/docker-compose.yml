x-common-env: &common_env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

x-common-service: &common_service
  networks:
    - homelab_network
  restart: unless-stopped

name: homelab-applications
services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    <<: *common_service
    environment:
      <<: *common_env
      USER_UID: ${PUID}
      USER_GID: ${PGID}
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: ${SERVER_IP}:${FORGEJO_DB_PORT}
      FORGEJO__database__NAME: forgejo
      FORGEJO__database__USER: forgejo
      FORGEJO__database__PASSWD: forgejo
    ports:
      - ${FORGEJO_PORT_WEB}:3000
      - ${FORGEJO_PORT_SSH}:22
    volumes:
      - ${CONFIG_ROOT}/forgejo/data:/data
      - /etc/localtime:/etc/localtime:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "1G"
    depends_on:
      - forgejo-db

  forgejo-db:
    image: postgres:14
    <<: *common_service
    environment:
      <<: *common_env
      POSTGRES_USER: forgejo
      POSTGRES_PASSWORD: forgejo
      POSTGRES_DB: forgejo
    ports:
      - ${FORGEJO_DB_PORT}:5432
    volumes:
      - ${CONFIG_ROOT}/forgejo-db/data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "256M"

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    <<: *common_service
    environment:
      <<: *common_env
      HOMEPAGE_ALLOWED_HOSTS: ${SERVER_IP}:${HOMEPAGE_PORT},home.${SERVER_DOMAIN}
    ports:
      - ${HOMEPAGE_PORT}:3000
    volumes:
      - ${CONFIG_ROOT}/homepage/config:/app/config
      - ${NAS}:${NAS}
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "256M"

  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    <<: *common_service
    environment:
      <<: *common_env
    ports:
      - ${SYNCTHING_PORT_UI}:8384
      - ${SYNCTHING_PORT_TRAFFIC}:22000
      - ${SYNCTHING_PORT_TRAFFIC}:22000/udp
      - ${SYNCTHING_PORT_DISCOVERY}:21027/udp
    volumes:
      - ${CONFIG_ROOT}/syncthing/config:/config
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "128M"

  vaultwarden:
    image: vaultwarden/server:latest
    <<: *common_service
    environment:
      <<: *common_env
    ports:
      - ${VAULTWARDEN_PORT}:80
    volumes:
      - ${CONFIG_ROOT}/vaultwarden/data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "128M"

  wud:
    image: getwud/wud
    <<: *common_service
    environment:
      <<: *common_env
      WUD_TRIGGER_DOCKER_UPDATE_AUTO: false
      WUD_TRIGGER_DOCKER_UPDATE_PRUNE: true
      WUD_WATCHER_DOCKER_CRON: 0 3 * * *
      WUD_REGISTRY_LSCR_PUBLIC_USERNAME: ${WUD_LSCR_USERNAME}
      WUD_REGISTRY_LSCR_PUBLIC_TOKEN: ${WUD_LSCR_TOKEN}
    ports:
      - ${WUD_PORT}:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

  zerobyte:
    image: ghcr.io/nicotsx/zerobyte:latest
    <<: *common_service
    privileged: true
    environment:
      <<: *common_env
      APP_SECRET: ${ZEROBYTE_SECRET}
      BASE_URL: http://${SERVER_IP}:${ZEROBYTE_PORT}
      TRUSTED_ORIGINS: https://zerobyte.${SERVER_DOMAIN}
      ENABLE_DEV_PANEL: true
      LOG_LEVEL: debug
    ports:
      - ${ZEROBYTE_PORT}:4096
    volumes:
      - ${CONFIG_ROOT}/zerobyte/data:/var/lib/zerobyte
      - ${NAS}:${NAS}
      - ${APPS}:${APPS}
      - /etc/localtime:/etc/localtime:ro
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: "2G"

networks:
  homelab_network:
    external: true
