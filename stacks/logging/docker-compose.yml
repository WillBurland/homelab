x-common-env: &common_env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

x-common-service: &common_service
  networks:
    - homelab_network
  restart: unless-stopped

name: homelab-logging
services:
  grafana:
    image: grafana/grafana:latest
    <<: *common_service
    environment:
      <<: *common_env
    ports:
      - ${GRAFANA_PORT}:3000
    volumes:
      - ${CONFIG_ROOT}/grafana/data:/var/lib/grafana
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "256M"

  prometheus:
    image: prom/prometheus:latest
    <<: *common_service
    environment:
      <<: *common_env
    ports:
      - ${PROMETHEUS_PORT}:9090
    volumes:
      - ${CONFIG_ROOT}/prometheus/data:/prometheus
      - ${CONFIG_ROOT}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-admin-api"
      - "--storage.tsdb.retention.time=90d"
      - "--storage.tsdb.retention.size=15GB"
      - "--storage.tsdb.wal-compression"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"

  uptime-kuma:
    image: louislam/uptime-kuma:2
    <<: *common_service
    environment:
      <<: *common_env
    ports:
      - ${UPTIME_KUMA_PORT}:3001
    volumes:
      - ${CONFIG_ROOT}/uptime-kuma/data:/app/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "256M"

networks:
  homelab_network:
    external: true
